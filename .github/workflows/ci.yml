name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup ROS 2 Lyrical
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: lyrical

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ros-lyrical-rclcpp \
            ros-lyrical-sensor-msgs \
            ros-lyrical-std-msgs \
            ros-lyrical-diagnostic-msgs \
            ros-lyrical-geometry-msgs \
            ros-lyrical-tf2 \
            ros-lyrical-tf2-ros \
            ros-lyrical-rqt-gui-cpp \
            ros-lyrical-qt-gui-cpp \
            ros-lyrical-pluginlib \
            ros-lyrical-ament-cmake-gtest

      - name: Build
        run: |
          source /opt/ros/lyrical/setup.bash
          cd ros2_ws
          colcon build --build-base build --install-base install

      - name: Test
        run: |
          source /opt/ros/lyrical/setup.bash
          cd ros2_ws
          colcon test \
            --build-base build \
            --install-base install \
            --packages-select imu_dds_adapter
          colcon test-result --verbose
