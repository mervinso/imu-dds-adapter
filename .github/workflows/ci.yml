name: CI

# ROS 2 Lyrical no está disponible en los runners de GitHub Actions.
# Este workflow documenta los pasos correctos para verificación local.
# Ver README.md → sección "Verificación manual en Lyrical".

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Check ROS 2 Lyrical availability
        run: |
          echo "Este proyecto requiere ROS 2 Lyrical instalado en el sistema."
          echo "ROS 2 Lyrical no está disponible en los runners de GitHub."
          echo ""
          echo "Para verificar localmente en una máquina con Lyrical:"
          echo "  source /opt/ros/lyrical/setup.bash"
          echo "  cd ros2_ws"
          echo "  colcon build --build-base build --install-base install"
          echo "  colcon test --packages-select imu_dds_adapter"
          echo "  colcon test-result --verbose"
          echo ""
          echo "Ver README.md para instrucciones completas."

      - name: Verify repository structure
        run: |
          echo "=== Estructura del repositorio ==="
          find ros2_ws/src -name "*.cpp" -o -name "*.hpp" -o -name "CMakeLists.txt" | sort
          echo ""
          echo "=== Tests disponibles ==="
          find ros2_ws/src -name "test_*.cpp" | sort
          echo ""
          echo "=== Archivos de configuración ==="
          find ros2_ws/src -name "*.yaml" -o -name "*.launch.py" -o -name "*.ui" | sort
